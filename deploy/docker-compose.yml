services:
  julia-app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: rop-julia
    restart: unless-stopped
    expose:
      - "8088"
    volumes:
      - julia-cache:/home/rop/.julia/compiled
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8088/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  nginx:
    image: nginx:alpine
    container_name: rop-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../webapp/public:/usr/share/nginx/html/public:ro
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - julia-app

volumes:
  julia-cache:
